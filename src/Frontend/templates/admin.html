<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — MindCheck</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../static/css/style.css" />
</head>
<body>

  <!-- NAV -->
  <nav id="navbar">
    <a href="index.html" class="nav-logo">
      <span class="dot"></span>MindCheck
    </a>
    <ul class="nav-links">
      <li><a href="index.html">← Back to home</a></li>
    </ul>
  </nav>

  <!-- ADMIN PAGE -->
  <main class="admin-page">

    <div class="admin-header">
      <div>
        <h1>Admin Dashboard</h1>
        <p>All submitted assessments from the database.</p>
      </div>
      <button class="btn-primary" onclick="loadData()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
        Refresh
      </button>
    </div>

    <!-- STATS ROW -->
    <div class="admin-stats" id="admin-stats">
      <div class="stat-card">
        <span class="stat-label">Total users</span>
        <span class="stat-value" id="stat-users">—</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Total assessments</span>
        <span class="stat-value" id="stat-assessments">—</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Average score</span>
        <span class="stat-value" id="stat-avg">—</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Most common result</span>
        <span class="stat-value" id="stat-common">—</span>
      </div>
    </div>

    <!-- TABLE -->
    <div class="admin-table-wrap">
      <div id="table-container">
        <p class="admin-empty">Loading data...</p>
      </div>
    </div>

  </main>

  <!-- FOOTER -->
  <footer>
    <span class="footer-logo">MindCheck</span>
    <p>Built as a DBMS project &mdash; <a href="https://github.com/Dia-Garg/Mental_health_analyser" target="_blank">View on GitHub</a></p>
    <p>Not a medical diagnostic tool &mdash; for academic use only</p>
  </footer>

  <script src="../static/js/main.js"></script>
  <script src="../static/js/admin.js"></script>
</body>
</html>
